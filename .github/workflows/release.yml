name: Build Release Package

on:
    workflow_dispatch:
        inputs:
            tag_name:
                description: Tag name to create for the prerelease, for example v0.1.2-beta.1
                required: true
                type: string
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        runs-on: windows-latest
        env:
            RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
            PLUGIN_ASSET_NAME: Jellyfin.Plugin.Popfeed-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}.zip
            STABLE_MANIFEST_BRANCH: release-manifest
            IS_STABLE_TAG: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup .NET 9 SDK
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "9.0.x"

            - name: Build release zip
              shell: pwsh
              run: >-
                  .\build-release.ps1
                  -Configuration Release
                  -Version ${{ env.RELEASE_TAG }}
                  -ManifestSourceUrl https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/${{ env.PLUGIN_ASSET_NAME }}
                  -ManifestOutputPath artifacts/manifest.json

            - name: Validate Jellyfin manifest shape
              shell: pwsh
              run: |
                  $ErrorActionPreference = 'Stop'
                  $manifest = Get-Content artifacts/manifest.json -Raw | ConvertFrom-Json
                  if ($manifest -isnot [System.Array]) {
                      throw 'artifacts/manifest.json must have an array at the root for Jellyfin custom repositories.'
                  }

            - name: Validate packaged plugin files
              shell: pwsh
              run: |
                  $ErrorActionPreference = 'Stop'
                  Add-Type -AssemblyName System.IO.Compression.FileSystem
                  $zip = [IO.Compression.ZipFile]::OpenRead((Resolve-Path "artifacts/${{ env.PLUGIN_ASSET_NAME }}"))
                  try {
                      $entries = $zip.Entries.FullName
                      foreach ($requiredEntry in @('Jellyfin.Plugin.Popfeed.dll', 'Jellyfin.Plugin.Popfeed.deps.json')) {
                          if ($entries -notcontains $requiredEntry) {
                              throw "Release ZIP is missing required file: $requiredEntry"
                          }
                      }
                  }
                  finally {
                      $zip.Dispose()
                  }

            - name: Upload artifact
              uses: actions/upload-artifact@v6
              with:
                  name: jellyfin-plugin-popfeed-${{ env.RELEASE_TAG }}
                  path: |
                      artifacts/${{ env.PLUGIN_ASSET_NAME }}
                      artifacts/manifest.json

            - name: Publish GitHub release asset
              if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ env.RELEASE_TAG }}
                  target_commitish: ${{ github.sha }}
                  files: |
                      artifacts/${{ env.PLUGIN_ASSET_NAME }}
                      artifacts/manifest.json
                  generate_release_notes: true
                  prerelease: ${{ github.event_name == 'workflow_dispatch' }}

            - name: Update stable Jellyfin manifest
              if: ${{ env.IS_STABLE_TAG == 'true' }}
              shell: pwsh
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  $ErrorActionPreference = 'Stop'

                  $manifestBranch = $env:STABLE_MANIFEST_BRANCH
                  $tempDir = Join-Path $env:RUNNER_TEMP 'stable-manifest'
                  $repoUrl = "https://x-access-token:$env:GH_TOKEN@github.com/${{ github.repository }}.git"

                  if (Test-Path $tempDir) {
                      Remove-Item $tempDir -Recurse -Force
                  }

                  git clone --depth 1 --branch $manifestBranch $repoUrl $tempDir 2>$null
                  if ($LASTEXITCODE -ne 0) {
                      git clone --depth 1 $repoUrl $tempDir
                      Push-Location $tempDir
                      git checkout --orphan $manifestBranch
                      Get-ChildItem -Force | Where-Object { $_.Name -ne '.git' } | Remove-Item -Recurse -Force
                      Pop-Location
                  }

                  Copy-Item artifacts/manifest.json (Join-Path $tempDir 'manifest.json') -Force

                  Push-Location $tempDir
                  git config user.name 'github-actions[bot]'
                  git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
                  git add manifest.json
                  git diff --cached --quiet
                  if ($LASTEXITCODE -eq 0) {
                      Write-Host 'Stable manifest already up to date.'
                  } else {
                      git commit -m "Update stable manifest for $env:RELEASE_TAG"
                      git push origin HEAD:$manifestBranch --force
                  }
                  Pop-Location
