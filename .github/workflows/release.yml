name: Build Release Package

on:
    workflow_dispatch:
    push:
        tags:
            - "v*"

jobs:
    build:
        runs-on: windows-latest
        env:
            PLUGIN_ASSET_NAME: Jellyfin.Plugin.Popfeed-${{ github.ref_name }}.zip

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET 9 SDK
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "9.0.x"

            - name: Build release zip
              shell: pwsh
              run: >-
                  .\build-release.ps1
                  -Configuration Release
                  -Version ${{ github.ref_name }}
                  -ManifestSourceUrl https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ env.PLUGIN_ASSET_NAME }}
                  -ManifestOutputPath artifacts/manifest.json

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: jellyfin-plugin-popfeed-${{ github.ref_name }}
                  path: |
                      artifacts/${{ env.PLUGIN_ASSET_NAME }}
                      artifacts/manifest.json

            - name: Publish GitHub release asset
              if: startsWith(github.ref, 'refs/tags/')
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      artifacts/${{ env.PLUGIN_ASSET_NAME }}
                      artifacts/manifest.json
                  generate_release_notes: true
