name: Build Release Package

on:
    workflow_dispatch:
        inputs:
            tag_name:
                description: Tag name to create for the prerelease, for example v0.1.2-beta.1
                required: true
                type: string
    push:
        tags:
            - "v*"
            - "*.*.*"

permissions:
    contents: write

jobs:
    build:
        runs-on: windows-latest
        env:
            RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
            PLUGIN_ASSET_NAME: Jellyfin.Plugin.Popfeed-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}.zip
            STABLE_MANIFEST_BRANCH: release-manifest
            IS_STABLE_TAG: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-') && contains(github.ref_name, '.') }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup .NET 9 SDK
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "9.0.x"

            - name: Build release zip
              shell: pwsh
              run: >-
                  .\build-release.ps1
                  -Configuration Release
                  -Version ${{ env.RELEASE_TAG }}
                  -ManifestSourceUrl https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/${{ env.PLUGIN_ASSET_NAME }}
                  -ManifestOutputPath artifacts/manifest.json

            - name: Validate Jellyfin manifest shape
              shell: pwsh
              run: |
                  $ErrorActionPreference = 'Stop'
                  $manifestText = Get-Content artifacts/manifest.json -Raw
                  $manifestDocument = [System.Text.Json.JsonDocument]::Parse($manifestText)
                  if ($manifestDocument.RootElement.ValueKind -ne [System.Text.Json.JsonValueKind]::Array) {
                      throw 'artifacts/manifest.json must have an array at the root for Jellyfin custom repositories.'
                  }

            - name: Validate packaged plugin files
              shell: pwsh
              run: |
                  $ErrorActionPreference = 'Stop'
                  Add-Type -AssemblyName System.IO.Compression.FileSystem
                  $zip = [IO.Compression.ZipFile]::OpenRead((Resolve-Path "artifacts/${{ env.PLUGIN_ASSET_NAME }}"))
                  try {
                      $entries = $zip.Entries.FullName
                      foreach ($requiredEntry in @('Jellyfin.Plugin.Popfeed.dll', 'meta.json')) {
                          if ($entries -notcontains $requiredEntry) {
                              throw "Release ZIP is missing required file: $requiredEntry"
                          }
                      }

                      $unexpectedEntries = $entries | Where-Object { $_ -notin @('Jellyfin.Plugin.Popfeed.dll', 'meta.json') }
                      if ($unexpectedEntries.Count -gt 0) {
                          throw "Release ZIP contains unexpected files: $($unexpectedEntries -join ', ')"
                      }
                  }
                  finally {
                      $zip.Dispose()
                  }

            - name: Upload artifact
              uses: actions/upload-artifact@v6
              with:
                  name: jellyfin-plugin-popfeed-${{ env.RELEASE_TAG }}
                  path: |
                      artifacts/${{ env.PLUGIN_ASSET_NAME }}
                      artifacts/manifest.json

            - name: Generate changelog
              shell: pwsh
              run: |
                  $ErrorActionPreference = 'Stop'
                  New-Item -ItemType Directory -Force -Path artifacts | Out-Null
                  $current = $env:RELEASE_TAG

                  # Resolve the commit range. On a tag push the tag exists, so diff
                  # against the previous tag reachable from it. On workflow_dispatch the
                  # tag does not exist yet, so diff the latest tag against HEAD.
                  git rev-parse --verify --quiet "$current^{commit}" > $null
                  if ($LASTEXITCODE -eq 0) {
                      $upper = $current
                      $prev = (git describe --tags --abbrev=0 "$current^" 2>$null)
                  } else {
                      $upper = 'HEAD'
                      $prev = (git describe --tags --abbrev=0 2>$null)
                  }
                  $range = if ([string]::IsNullOrWhiteSpace($prev)) { $upper } else { "$prev..$upper" }

                  $subjects = git log $range --no-merges --pretty=format:'%s'
                  if ($null -eq $subjects) { $subjects = @() }

                  # Conventional-commit type -> changelog section, in display order.
                  $sections = [ordered]@{
                      'feat'     = '### ✨ Features'
                      'fix'      = '### 🐛 Bug Fixes'
                      'perf'     = '### ⚡ Performance'
                      'refactor' = '### ♻️ Refactoring'
                      'docs'     = '### 📝 Documentation'
                      'build'    = '### 🏗️ Build'
                      'ci'       = '### 👷 CI'
                      'test'     = '### ✅ Tests'
                      'chore'    = '### 🔧 Chores'
                  }
                  $buckets = @{}
                  $other = New-Object System.Collections.Generic.List[string]

                  foreach ($s in @($subjects)) {
                      if ($s -match '^(?<type>\w+)(\([^)]*\))?(?<break>!)?:\s*(?<desc>.+)$') {
                          $type = $matches['type'].ToLower()
                          # Strip a leading emoji/icon so the description reads cleanly.
                          $desc = ($matches['desc'] -replace '^[^\p{L}\p{N}]+', '').Trim()
                          if ($matches['break']) { $desc = "**BREAKING** $desc" }
                          if ($sections.Contains($type)) {
                              if (-not $buckets.ContainsKey($type)) {
                                  $buckets[$type] = New-Object System.Collections.Generic.List[string]
                              }
                              $buckets[$type].Add("- $desc")
                          } else {
                              $other.Add("- $desc")
                          }
                      } elseif (-not [string]::IsNullOrWhiteSpace($s)) {
                          $other.Add("- $s")
                      }
                  }

                  $sb = New-Object System.Text.StringBuilder
                  foreach ($type in $sections.Keys) {
                      if ($buckets.ContainsKey($type)) {
                          [void]$sb.AppendLine($sections[$type])
                          [void]$sb.AppendLine('')
                          foreach ($line in $buckets[$type]) { [void]$sb.AppendLine($line) }
                          [void]$sb.AppendLine('')
                      }
                  }
                  if ($other.Count -gt 0) {
                      [void]$sb.AppendLine('### Other')
                      [void]$sb.AppendLine('')
                      foreach ($line in $other) { [void]$sb.AppendLine($line) }
                      [void]$sb.AppendLine('')
                  }
                  if ($sb.Length -eq 0) { [void]$sb.AppendLine('Maintenance release.') }

                  Set-Content -Path artifacts/release-notes.md -Value $sb.ToString() -Encoding UTF8
                  Write-Host "----- release-notes.md -----"
                  Get-Content artifacts/release-notes.md

            - name: Publish GitHub release asset
              if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ env.RELEASE_TAG }}
                  target_commitish: ${{ github.sha }}
                  files: |
                      artifacts/${{ env.PLUGIN_ASSET_NAME }}
                      artifacts/manifest.json
                  body_path: artifacts/release-notes.md
                  generate_release_notes: true
                  prerelease: ${{ github.event_name == 'workflow_dispatch' }}

            - name: Update stable Jellyfin manifest
              if: ${{ env.IS_STABLE_TAG == 'true' }}
              shell: pwsh
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  $ErrorActionPreference = 'Stop'

                  function Read-ManifestEntries {
                      param([string]$Path)

                      if (-not (Test-Path $Path)) {
                          return @()
                      }

                      $json = Get-Content $Path -Raw
                      $document = [System.Text.Json.JsonDocument]::Parse($json)

                      if ($document.RootElement.ValueKind -eq [System.Text.Json.JsonValueKind]::Array) {
                          return @(ConvertFrom-Json -InputObject $json -NoEnumerate)
                      }

                      if ($document.RootElement.ValueKind -eq [System.Text.Json.JsonValueKind]::Object) {
                          return @((ConvertFrom-Json -InputObject $json))
                      }

                      throw "Manifest at $Path must have an object or array root."
                  }

                  function Sort-VersionEntries {
                      param([object[]]$Entries)

                      return @(
                          $Entries |
                              Sort-Object -Descending -Property @(
                                  @{ Expression = {
                                          try {
                                              [version]$_.version
                                          }
                                          catch {
                                              [version]'0.0.0.0'
                                          }
                                      }
                                  },
                                  @{ Expression = { $_.timestamp } })
                      )
                  }

                  $manifestBranch = $env:STABLE_MANIFEST_BRANCH
                  $tempDir = Join-Path $env:RUNNER_TEMP 'stable-manifest'
                  $repoUrl = "https://x-access-token:$env:GH_TOKEN@github.com/${{ github.repository }}.git"

                  if (Test-Path $tempDir) {
                      Remove-Item $tempDir -Recurse -Force
                  }

                  git clone --depth 1 --branch $manifestBranch $repoUrl $tempDir 2>$null
                  if ($LASTEXITCODE -ne 0) {
                      git clone --depth 1 $repoUrl $tempDir
                      Push-Location $tempDir
                      git checkout --orphan $manifestBranch
                      Get-ChildItem -Force | Where-Object { $_.Name -ne '.git' } | Remove-Item -Recurse -Force
                      Pop-Location
                  }

                  $stableManifestPath = Join-Path $tempDir 'manifest.json'
                  $incomingEntries = Read-ManifestEntries -Path 'artifacts/manifest.json'
                  $existingEntries = Read-ManifestEntries -Path $stableManifestPath

                  foreach ($incomingEntry in $incomingEntries) {
                      $existingEntry = $existingEntries | Where-Object { $_.guid -eq $incomingEntry.guid } | Select-Object -First 1

                      if ($null -eq $existingEntry) {
                          $incomingEntry.versions = Sort-VersionEntries -Entries @($incomingEntry.versions)
                          $existingEntries += $incomingEntry
                          continue
                      }

                      foreach ($property in @('name', 'description', 'overview', 'owner', 'category', 'imageUrl')) {
                          if ($incomingEntry.PSObject.Properties.Name -notcontains $property) {
                              continue
                          }

                          if ($existingEntry.PSObject.Properties.Name -contains $property) {
                              $existingEntry.$property = $incomingEntry.$property
                              continue
                          }

                          $existingEntry | Add-Member -NotePropertyName $property -NotePropertyValue $incomingEntry.$property
                      }

                      $existingVersions = @($existingEntry.versions)
                      $incomingVersions = @($incomingEntry.versions)
                      $incomingVersionNumbers = @($incomingVersions | ForEach-Object { $_.version })

                      $mergedVersions = @($incomingVersions)
                      $mergedVersions += @($existingVersions | Where-Object { $incomingVersionNumbers -notcontains $_.version })
                      $existingEntry.versions = Sort-VersionEntries -Entries $mergedVersions
                  }

                  $manifestJson = ConvertTo-Json -InputObject @($existingEntries) -Depth 12
                  Set-Content -Path $stableManifestPath -Value $manifestJson -Encoding UTF8

                  Push-Location $tempDir
                  git config user.name 'github-actions[bot]'
                  git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
                  git add manifest.json
                  git diff --cached --quiet
                  if ($LASTEXITCODE -eq 0) {
                      Write-Host 'Stable manifest already up to date.'
                  } else {
                      git commit -m "Update stable manifest for $env:RELEASE_TAG"
                      # Rebase on latest branch head to avoid race-condition rollbacks
                      # when multiple tag workflows run concurrently.
                      git pull --rebase origin $manifestBranch
                      git push origin HEAD:$manifestBranch
                  }

                  # Fetch the remote branch again and verify the expected versions are present.
                  # This makes manifest publication failures explicit in CI instead of silent.
                  git fetch --depth 1 origin $manifestBranch
                  $verifyPath = Join-Path $tempDir 'manifest.remote.json'
                  git show "origin/$manifestBranch`:manifest.json" | Set-Content -Path $verifyPath -Encoding UTF8

                  $remoteEntries = Read-ManifestEntries -Path $verifyPath
                  foreach ($incomingEntry in $incomingEntries) {
                      $remoteEntry = $remoteEntries | Where-Object { $_.guid -eq $incomingEntry.guid } | Select-Object -First 1
                      if ($null -eq $remoteEntry) {
                          throw "Stable manifest verification failed: guid '$($incomingEntry.guid)' missing on remote branch '$manifestBranch'."
                      }

                      $remoteVersions = @($remoteEntry.versions | ForEach-Object { $_.version })
                      foreach ($incomingVersion in @($incomingEntry.versions | ForEach-Object { $_.version })) {
                          if ($remoteVersions -notcontains $incomingVersion) {
                              throw "Stable manifest verification failed: version '$incomingVersion' missing for guid '$($incomingEntry.guid)' on remote branch '$manifestBranch'."
                          }
                      }
                  }

                  Write-Host "Stable manifest verification passed for $env:RELEASE_TAG on branch '$manifestBranch'."
                  Pop-Location
