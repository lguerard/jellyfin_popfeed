name: Build Release Package

on:
    workflow_dispatch:
        inputs:
            tag_name:
                description: Tag name to create for the prerelease, for example v0.1.2-beta.1
                required: true
                type: string
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        runs-on: windows-latest
        env:
            RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
            PLUGIN_ASSET_NAME: Jellyfin.Plugin.Popfeed-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}.zip

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup .NET 9 SDK
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "9.0.x"

            - name: Build release zip
              shell: pwsh
              run: >-
                  .\build-release.ps1
                  -Configuration Release
                  -Version ${{ env.RELEASE_TAG }}
                  -ManifestSourceUrl https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/${{ env.PLUGIN_ASSET_NAME }}
                  -ManifestOutputPath artifacts/manifest.json

            - name: Upload artifact
              uses: actions/upload-artifact@v6
              with:
                  name: jellyfin-plugin-popfeed-${{ env.RELEASE_TAG }}
                  path: |
                      artifacts/${{ env.PLUGIN_ASSET_NAME }}
                      artifacts/manifest.json

            - name: Publish GitHub release asset
              if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ env.RELEASE_TAG }}
                  target_commitish: ${{ github.sha }}
                  files: |
                      artifacts/${{ env.PLUGIN_ASSET_NAME }}
                      artifacts/manifest.json
                  generate_release_notes: true
                  prerelease: ${{ github.event_name == 'workflow_dispatch' }}
